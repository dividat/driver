name: Release Tag

on:
  push:
    tags:
      # pseudo-semver match
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write


jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: git fetch --tags --force origin ${{ github.ref }}
      - run: git checkout ${{ github.ref }}
      - run: git describe --always HEAD
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@def9f5a5c6a6b8751c0534e8813a5d0ad2635660 # v11
      - run: nix develop --command make crossbuild_mac
      - run: nix develop --command make crossbuild_mac_bundles
      - name: 'Upload Artifacts'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        id: upload
        with:
          name: binaries-macos
          path: bin/*

  build-others:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: git fetch --tags --force origin ${{ github.ref }}
      - run: git checkout ${{ github.ref }}
      - run: git describe --always HEAD
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/magic-nix-cache-action@def9f5a5c6a6b8751c0534e8813a5d0ad2635660 # v11
      - run: nix develop --command make crossbuild
      - name: 'Upload Artifacts'
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-others
          path: bin/*

  release:
    needs: [build-macos, build-others]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: binaries-*
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            --verify-tag \
            --notes-from-tag \
            "$GITHUB_REF_NAME" \
            $(find artifacts/ -maxdepth 1 -type f)
